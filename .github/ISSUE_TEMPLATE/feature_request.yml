name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: input
    id: area
    attributes:
      label: Related area
      description: "e.g. MVFC.MyLib, or 'new feature'"
      placeholder: "MVFC.MyLib"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem this feature solves
      placeholder: "Currently there is no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "Add a method/helper that..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "I considered doing X but..."
